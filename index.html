<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPrint - Estilo único para vos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
        }

        .product-card {
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .product-card img {
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.1);
        }

        .filter-btn {
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background-color: #030213;
            color: white;
        }

        .filter-btn:not(.active) {
            background-color: #ececf0;
            color: #717182;
        }

        .filter-btn:not(.active):hover {
            background-color: #e9ebef;
        }

        .whatsapp-btn {
            background-color: #25D366;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            background-color: #20BA5A;
            transform: scale(1.05);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .whatsapp-float:hover {
            background-color: #20BA5A;
            transform: scale(1.1);
        }

        .instagram-btn {
            background: linear-gradient(to right, #8b5cf6, #ec4899, #f97316);
        }

        .instagram-btn:hover {
            opacity: 0.9;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
                        <path d="M3 6h18"/>
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                    </svg>
                    <div>
                        <h1 class="text-2xl font-medium">PixelPrint</h1>
                        <p class="text-xs text-gray-500">Estilo único para vos</p>
                    </div>
                </div>

                <a href="https://www.instagram.com/pixelprints.ar?igsh=MTZuZWh0cmswZWQ2eQ==" target="_blank" class="instagram-btn flex items-center gap-2 px-4 py-2 rounded-lg text-white transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
                    </svg>
                    <span class="hidden sm:inline">Seguinos</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-2 overflow-x-auto scrollbar-hide">
                <button onclick="filterProducts('Todas')" class="filter-btn active px-4 py-2 rounded-full whitespace-nowrap" data-category="Todas">
                    Todas
                </button>
                <button onclick="filterProducts('Remeras')" class="filter-btn px-4 py-2 rounded-full whitespace-nowrap" data-category="Remeras">
                    Remeras
                </button>
                <button onclick="filterProducts('Busos')" class="filter-btn px-4 py-2 rounded-full whitespace-nowrap" data-category="Busos">
                    Busos
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8 text-center">
            <h2 class="text-xl font-medium mb-2">Encontrá tu estilo perfecto</h2>
            <p class="text-gray-500">Remeras desde $22.000 | Busos desde $35.000</p>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
        </div>

        <div id="no-products" class="text-center py-12 hidden">
            <p class="text-gray-500">No hay productos en esta categoría</p>
        </div>
    </main>

    <!-- WhatsApp Floating Button -->
    <div class="whatsapp-float" onclick="contactWhatsApp()">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-500 mb-2">PixelPrint - Estilo único para vos</p>
            <p class="text-sm text-gray-400">Contactanos por WhatsApp para consultas y pedidos</p>
        </div>
    </footer>

    <script>
        // IMPORTANTE: Reemplazá '5491112345678' con tu número de WhatsApp Business (formato internacional sin +)
        const WHATSAPP_NUMBER = '543400667550';

        const products = [
            {
                id: 1,
                name: 'Remera Kinder Planet',
                price: 22000,
                category: 'Remeras',
                image: 'pagina1.jpeg'
            },
            {
                id: 2,
                name: 'Remera Estampada Diseño 1',
                price: 22000,
                category: 'Remeras',
                image: 'https://images.unsplash.com/photo-1667544417110-403b89341112?w=600'
            },
            {
                id: 3,
                name: 'Remera Estampada Diseño 2',
                price: 22000,
                category: 'Remeras',
                image: 'https://images.unsplash.com/photo-1684956500542-8a992e8acf78?w=600'
            },
            {
                id: 4,
                name: 'Remera Estampada Diseño 3',
                price: 22000,
                category: 'Remeras',
                image: 'https://images.unsplash.com/photo-1686036248156-801ee8e03c28?w=600'
            },
            {
                id: 5,
                name: 'Buzo Death Note',
                price: 35000,
                category: 'Busos',
                image: 'pagina_11.jpeg'
            },
            {
                id: 6,
                name: 'Buzo Negro Diseño 2',
                price: 35000,
                category: 'Busos',
                image: 'https://images.unsplash.com/photo-1628749528997-5f2003155d09?w=600'
            }
        ];

        let currentCategory = 'Todas';

        function formatPrice(price) {
            return price.toLocaleString('es-AR');
        }

        function createProductCard(product) {
            return `
                <div class="product-card group relative bg-white rounded-lg overflow-hidden shadow-sm border border-gray-200">
                    <div class="aspect-square overflow-hidden bg-gray-100">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-4">
                        <span class="text-xs text-gray-500 uppercase tracking-wide">${product.category}</span>
                        <h3 class="mt-1 mb-2 font-medium">${product.name}</h3>
                        <p class="text-lg mb-4">$${formatPrice(product.price)}</p>
                        <div class="flex gap-2">
                            <button onclick="contactProduct('${product.name}', ${product.price})" class="whatsapp-btn flex-1 flex items-center justify-center gap-2 text-white px-4 py-2.5 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                                </svg>
                                WhatsApp
                            </button>
                            <button class="bg-black text-white p-2.5 rounded-lg hover:bg-gray-800 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="8" cy="21" r="1"/>
                                    <circle cx="19" cy="21" r="1"/>
                                    <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const noProducts = document.getElementById('no-products');

            const filteredProducts = currentCategory === 'Todas'
                ? products
                : products.filter(p => p.category === currentCategory);

            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
                noProducts.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                noProducts.classList.add('hidden');
                grid.innerHTML = filteredProducts.map(product => createProductCard(product)).join('');
            }
        }

        function filterProducts(category) {
            currentCategory = category;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            renderProducts();
        }

        function contactProduct(name, price) {
            const message = encodeURIComponent(`¡Hola! Me interesa "${name}" - $${formatPrice(price)}`);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
        }

        function contactWhatsApp() {
            const message = encodeURIComponent('¡Hola! Me gustaría conocer más sobre sus remeras');
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
        }

        renderProducts();
    </script>
</body>
</html>
